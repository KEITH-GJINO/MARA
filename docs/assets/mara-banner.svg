<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="200" rx="12" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
  </g>

  <!-- Decorative nodes -->
  <circle cx="120" cy="60" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="480" cy="140" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="200" cy="150" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="420" cy="55" r="2" fill="#8b5cf6" opacity="0.3"/>

  <!-- Connection lines -->
  <line x1="120" y1="60" x2="200" y2="150" stroke="#6366f1" stroke-width="0.5" opacity="0.15"/>
  <line x1="420" y1="55" x2="480" y2="140" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>

  <!-- Accent bar -->
  <rect x="220" y="68" width="160" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Title -->
  <text x="300" y="58" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="12">MARA</text>

  <!-- Subtitle -->
  <text x="300" y="100" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="#a5b4fc" letter-spacing="4" text-transform="uppercase">MARKETING AGENT RUNTIME ARCHITECTURE</text>

  <!-- Tagline -->
  <text x="300" y="140" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="300" fill="#6b7280" letter-spacing="1">Autonomous AI agents for modern marketing operations</text>

  <!-- Version badge -->
  <rect x="256" y="155" width="88" height="20" rx="10" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.5"/>
  <text x="300" y="169" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="9" fill="#8b5cf6" opacity="0.8">v0.1.0-alpha</text>
</svg>
